services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authuser -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: auth-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/authdb
      DB_USERNAME: authuser
      DB_PASSWORD: authpass
      JWT_SECRET: local-dev-secret-key-that-is-at-least-256-bits-long-for-HS256-algorithm!!
      JWT_ACCESS_EXPIRY_MS: "900000"
      JWT_REFRESH_EXPIRY_MS: "604800000"
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      ADMIN_BOOTSTRAP_EMAIL: admin@localhost.com
      ADMIN_BOOTSTRAP_PASSWORD: AdminPass123!
    ports:
      - "8080:8080"

volumes:
  pgdata:
